[platformio]
default_envs = dieselfire

; ── DieselFire target (ESP32-S3, 8MB flash + PSRAM) ──────────
[env:dieselfire]
platform = espressif32@6.12.0
board = dieselfire
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.partitions = 8MB_partition.csv
board_upload.flash_size = 8MB
board_build.psram = enable
board_build.psram_mode = opsram
board_build.psram_type = octal

framework = arduino

upload_protocol = esp_usb_cdc
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_usb_cdc

extra_scripts = post:add_CRC.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DHTTPS_LOGLEVEL=2

lib_deps =
    lvgl/lvgl@^9.5.0
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit BME280 Library@^2.3.0
    adafruit/RTClib@^2.1.3
    arduinojson/ArduinoJson@^7.2.0
    marvinroger/async-mqtt-client@^0.9.0
    mathieucarbou/ESPAsyncWebServer@^3.3.2
    me-no-dev/AsyncTCP@^3.2.3

debug_tool = esp-prog
debug_init_break =

; ── Legacy ESP32 target (for testing on old hardware) ─────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = DFpartition.csv

upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200

extra_scripts = post:add_CRC.py

build_flags =
    -Wl,--wrap,millis
    -DHTTPS_LOGLEVEL=2

debug_tool = esp-prog
debug_init_break =
