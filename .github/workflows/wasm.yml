name: WASM Build

on:
  push:
    branches: [main, master]
    paths:
      - 'simulator/**'
      - 'src/**'
      - '.github/workflows/wasm.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: |
          cd simulator
          mkdir -p build_wasm
          cd build_wasm
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd simulator/build_wasm
          emmake make -j$(nproc)

      - name: Prepare Pages content
        run: |
          # Move WASM simulator into /sim/, landing page at root
          mkdir -p simulator/build_wasm/sim/
          mv simulator/build_wasm/index.html simulator/build_wasm/sim/
          mv simulator/build_wasm/index.js simulator/build_wasm/sim/
          mv simulator/build_wasm/index.wasm simulator/build_wasm/sim/
          cp simulator/site/index.html simulator/build_wasm/

      - name: Download latest release binary for FOTA
        run: |
          mkdir -p simulator/build_wasm/fota/
          # Fetch the latest release tag from GitHub API
          LATEST=$(curl -sL https://api.github.com/repos/${{ github.repository }}/releases/latest | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name',''))" 2>/dev/null || true)
          if [ -n "$LATEST" ]; then
            VERSION="${LATEST#v}"
            # Download fota.json manifest
            curl -sL -o simulator/build_wasm/fota/fota.json \
              "https://github.com/${{ github.repository }}/releases/download/$LATEST/fota.json" || true
            # Download firmware binary
            curl -sL -o simulator/build_wasm/fota/dieselfire-${VERSION}.bin \
              "https://github.com/${{ github.repository }}/releases/download/$LATEST/dieselfire-${VERSION}.bin" || true
            echo "Downloaded FOTA assets for $LATEST"
          else
            echo "No release found — skipping FOTA binary"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: simulator/build_wasm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://dieselfire.wabo.cc
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
