<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DieselFire Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #ccc;
    }
    #container {
      position: relative;
      width: 320px;
      height: 240px;
    }
    #container canvas.emscripten {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      border: 2px solid #333;
      border-radius: 4px;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #FF8C00;
      font-size: 18px;
    }
    #loading .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #444;
      border-top-color: #FF8C00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="loading">
      <div class="spinner"></div>
      <div>Loading DieselFire...</div>
    </div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="status">DieselFire Simulator — click to interact, touch if on mobile</div>

  <script>
    var Module = {
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost'); e.preventDefault(); }, false);
        return canvas;
      })(),
      onRuntimeInitialized: function() {
        document.getElementById('loading').style.display = 'none';
      },
      setStatus: function(text) {
        if (text) {
          document.getElementById('loading').innerHTML =
            '<div class="spinner"></div><div>' + text + '</div>';
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : '');
      }
    };
  </script>
  <script src="index.js"></script>
</body>
</html>
