[platformio]
default_envs = dieselfire

; ── DieselFire target (ESP32-S3, 8MB flash + PSRAM) ──────────
[env:dieselfire]
platform = espressif32@6.12.0
board = dieselfire
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.partitions = 8MB_partition.csv
board_upload.flash_size = 8MB

framework = arduino

upload_protocol = esp_usb_cdc
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_usb_cdc

extra_scripts = post:add_CRC.py

; Exclude legacy/conflicting code for the new hardware target
; OLED/     — replaced by LVGL (src/Display/)
; DF_GPIO   — uses ESP32-specific ADC API incompatible with ESP32-S3
; DF_GPIO — uses ESP32-specific ADC API incompatible with ESP32-S3
; BluetoothHC05 — not used (HC-05 not present on new PCB)
; DFWebServer — re-implemented with ESPAsyncWebServer
; BrowserUpload — handled natively by ESPAsyncWebServer
src_filter = +<*> -<OLED/> -<Utility/DF_GPIO.cpp> -<Bluetooth/BluetoothHC05.cpp>

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=5
    -DHTTPS_LOGLEVEL=2
    -I.

lib_deps =
    lvgl/lvgl@^9.5.0
    lovyan03/LovyanGFX@^1.1.6
    tzapu/WiFiManager@^2.0.17
    me-no-dev/ESPAsyncWebServer@^1.2.3

debug_tool = esp-prog
debug_init_break =

; ── Legacy ESP32 target (for testing on old hardware) ─────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = DFpartition.csv

upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200

extra_scripts = post:add_CRC.py

build_flags =
    -Wl,--wrap,millis
    -DHTTPS_LOGLEVEL=2

debug_tool = esp-prog
debug_init_break =
