name: WASM Build

on:
  push:
    branches: [main, master]
    paths:
      - 'simulator/**'
      - 'src/**'
      - '.github/workflows/wasm.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: |
          cd simulator
          mkdir -p build_wasm
          cd build_wasm
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd simulator/build_wasm
          emmake make -j$(nproc)

      - name: Prepare Pages content
        run: |
          # Landing page at root, simulator in /sim/
          cp simulator/site/index.html simulator/build_wasm/
          mkdir -p simulator/build_wasm/sim/
          mv simulator/build_wasm/index.html simulator/build_wasm/sim/
          mv simulator/build_wasm/index.js simulator/build_wasm/sim/
          mv simulator/build_wasm/index.wasm simulator/build_wasm/sim/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: simulator/build_wasm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://dieselfire.wabo.cc
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
